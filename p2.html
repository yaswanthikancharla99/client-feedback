<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Feedback & Analytics Portal</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#343a40;
color:white;
padding:15px;
text-align:center;
}

.container{

width:500px;
background:white;
margin:30px auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px gray;

}

input, select, textarea{

width:100%;
padding:8px;
margin:8px 0;

}

button{

width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
cursor:pointer;

}

button:hover{

background:#0056b3;

}

table{

width:100%;
margin-top:20px;
border-collapse:collapse;

}

th, td{

border:1px solid gray;
padding:8px;
text-align:center;

}

.analytics{

margin-top:15px;
font-weight:bold;

}

</style>

</head>


<body>


<header>

<h2>Client Feedback & Analytics Portal</h2>

</header>



<div class="container">


<label>Client Name</label>
<input type="text" id="name">


<label>Service</label>

<select id="service">

<option>Web Development</option>

<option>App Development</option>

<option>Support</option>

<option>Consulting</option>

</select>


<label>Rating (1-5)</label>

<input type="number" id="rating" min="1" max="5">


<label>Feedback</label>

<textarea id="feedback"></textarea>


<button onclick="addFeedback()">Submit Feedback</button>



<div class="analytics">

<p id="total">Total Feedback: 0</p>

<p id="average">Average Rating: 0</p>

</div>



<table id="table">

<tr>

<th>Name</th>

<th>Service</th>

<th>Rating</th>

<th>Feedback</th>

</tr>

</table>


</div>




<script>


let total=0;

let sum=0;



function addFeedback(){


let name=document.getElementById("name").value;

let service=document.getElementById("service").value;

let rating=parseInt(document.getElementById("rating").value);

let feedback=document.getElementById("feedback").value;



if(name=="" || rating=="" || feedback==""){

alert("Please fill all fields");

return;

}



let table=document.getElementById("table");


let row=table.insertRow();


row.insertCell(0).innerHTML=name;

row.insertCell(1).innerHTML=service;

row.insertCell(2).innerHTML=rating;

row.insertCell(3).innerHTML=feedback;



total++;

sum+=rating;


let avg=(sum/total).toFixed(2);


document.getElementById("total").innerHTML="Total Feedback: "+total;

document.getElementById("average").innerHTML="Average Rating: "+avg;



document.getElementById("name").value="";

document.getElementById("rating").value="";

document.getElementById("feedback").value="";


}


</script>



</body>
</html>
